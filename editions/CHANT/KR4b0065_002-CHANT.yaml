女挾琴歸類聚三詩紀六十九賦得入階雨細雨階前入灑砌復沾帷漬花枝覺重濕鳥羽飛遲儻令斜日照併欲似遊絲類聚二文苑英華百五十三詩紀六十九詠柳垂陰滿上路結草早知春花絮時隨鳥風枝屢拂塵欲散依依采時要歌吹人類聚八十九詩紀六十九詠芙蓉圓花一蔕卷交葉半心開影前光照耀香裏蝶徘徊欣隨玉露點不逐秋風催類聚八十二詩紀六十九又合璧事類別集三十二引開摧二韻詠梔子花詠梔子花素華偏可憙的的半臨池疑為霜裏葉復類雪封枝日斜光隱見風還影合離類聚八十九合璧事類別集三十二無題詩紀六十九又草堂詩箋十八梔子詩注引池一韻賦得薔薇賦得薔薇石榴珊瑚蕊木槿懸星葩豈如茲草麗逢春始發花迴風舒紫萼照日吐新芽類聚八十一合璧事類別集三十詩紀六十九仰和衛尉新渝侯巡城口號帝京風雨中層闕煙霞浮玉署清餘熱金城含暮秋水觀淩卻敵槐影帶重樓類聚二十八詩紀六十九臨後園隱淪遊少海神仙入太華我有逍遙趣中園復可嘉千株同落葉百丈共尋霞類聚六十五詩紀六十九雨後散絲與山氣忽合復俄晴雷音稍入嶺電影尚連城雨餘雲稍薄風收熱復生初學記二文苑英華百五十五詩紀六十九和會三教聚沫多緣假標空非色香漢君雖起夢晉后徒降祥玄機昔未辯洞鑒資我皇類聚七十六詩紀六十九侍講詩物善渥深慈監撫宣王事英邁八解心高超七花意類聚七十六詩紀六十九登錦堂登錦堂孫生酸棗寺王子枝江樓何如登石鏡因閒猶豫遊類聚二十八詩紀六十九夜遊北園星芒侵嶺樹月暈隱城樓暗花舒不覺明波動見流類聚六十五詩紀六十九遊韋黃門園息車冠蓋里停轡仲長園簷疎遠興積賓至羽觴繁類聚六十五詩紀六十九入漵浦泛水入迴塘空枝度日光竹垂懸掃浪鳧疑遠避檣類聚九詩紀六十九罷丹陽郡往與吏民別久歸從事麥非留故吏錢柳栽今尚在棠陰君詎憐類聚五十詩紀六十九示晉陵弟零雨岐路悲送歸臨水節時事雖為舛離憂等閒別類聚二十九詩紀六十九夜望浮圖上相輪絕句光中辨垂鳳霧裏見飛鸞定用方諸水持添承露盤類聚七十六廣弘明集三十詩紀六十九愁閨照鏡別來顦顇久他人怪容色只有匣中鏡還持自相識玉臺新詠箋注十詩紀六十九金閨思二首遊子久不返妾身當何依日移孤影動羞覩燕雙飛古詩類苑九十五詩紀六十九自君之別矣不復染膏脂南風送歸雁聊以寄相思同上寒閨綠葉朝朝黃紅顏日日異譬喻持相比那堪不愁思玉臺新詠箋注十詩紀六十九從頓還城南暫別兩成疑開簾生舊憶都知未有情更似新相識玉臺新詠箋注十詩紀六十九夜遣內人還後舟錦幔扶船列蘭橈拂浪浮去燭猶文水餘香尚滿舟玉臺新詠箋注十詩紀六十九贈麗人腰肢本猶絕眉眼特驚人判自無相比還來有洛神玉臺新詠箋注十詩紀六十九遙望散誕垂紅帔斜柯插玉簪可憐無有比恣許直千金玉臺新詠箋注十詩紀六十九行雨本是巫山來無人覩容色唯有楚王臣曾言夢相識玉臺新詠箋注十詩紀六十九和人渡水婉娩新上頭湔裾出樂遊帶前結香草鬟邊插石榴玉臺新詠箋注十詩紀六十九雜詠被空眠數覺寒重夜風吹羅帷非海水那得度前知玉臺新詠箋注十詩紀六十九詠武陵王左右詠柳頂分如兩髻簪長驗上頭投杯如欲轉疑殘已復留玉臺新詠箋注十詩紀六十九彈箏彈箏北窗下夜響清音愁張高絃易斷心傷曲不遒玉臺新詠箋注十詩紀六十九梁塵依帷濛重翠帶日聚輕紅定為歌聲起非關團扇風玉臺新詠箋注十類聚六詩紀六十九遊人遊戲長楊苑攜手雲臺間歡樂未窮已白日下西山玉臺新詠箋注十詩紀六十九詠朝日詠朝日團團出天外煜煜上層峰光隨浪高下影逐樹輕濃初學記一文苑英華百五十一詩紀六十九望月今夜月光來正上相思臺可憐無遠近光照悉徘徊類聚一詩紀六十九華月兔絲生雲夜蛾形出漢時欲傳千里意不照十年悲玉臺新詠箋注十詩紀六十九詠雲詠雲浮雲舒五色瑪瑙應霜天玉葉散秋影金風飄紫煙類聚一詩紀六十九浮雲可憐片雲生暫重復還輕欲使襄王夢應過白帝城玉臺新詠箋注十詩紀六十九大同九年秋七月大同九年秋七月高樓闢左扇迴望依蘭橈晚風颻颺來落照參差好類聚二十八詩紀六十九詠薔薇燕來枝益軟風飄花轉光氤氳不肯去還來階上香類聚八十一詩紀六十九檉檉淩寒競貞節負雪固難虧無慚雲母桂詎減珊瑚枝類聚八十九詩紀六十九詠疏楓詠疏楓萎綠映葭青疏紅分浪白花葉灑行舟仍持送遠客類聚八十九詩紀六十九詠藤詠藤纖條寄喬木弱影掣風斜標春抽曉翠出霧掛懸花類聚八十二詩紀六十九詠飛來鸂鶒詠飛來鸂鶒飛從何處來似出上林隈口銜長生葉翅染昆明苔類聚九十二詩紀六十九詠單鳧銜苔入淺水刷羽向沙洲孤飛本欲去得影更淹留類聚九十一詩紀六十九詠寒鳧詠寒鳧迴水浮輕浪沙場弄羽衣眇眇隨山沒離離傍海飛類聚九十一詩紀六十九新燕新燕新禽應節歸俱向吹樓飛入簾驚釧響來窗礙舞衣玉臺新詠箋注十類聚九十二文苑英華三百二十九作梁昭明太子詩紀六十九蜂蜂逐風從泛漾照日乍依微知君不留眄銜花空自飛類聚九十七詩紀六十九詠籠燈絕句動焰翠帷裏散影羅帳前花心生復落明銷君詎憐類聚八十詩紀六十九賦得白羽扇賦得白羽扇可憐白羽扇卻暑復來氛終無顧庶子誰為一揮軍類聚六十九詩紀六十九詠獨舞因羞強正釵顧影時迴袂非關善留客更是嬌夫壻初學記十五萬花谷三十二作梁簡文詩詩紀六十九詠舞嬌情因曲動弱步逐風吹懸釵隨舞落飛袖拂鬟垂類聚四十三初學記十五萬花谷後三十二作梁簡文帝詩詩紀六十九七夕穿針七夕穿針憐從帳裏出想見夜窗開針欹疑月暗縷散怪風來類聚四初學記四古今歲時雜詠二十五御覽三十一詩紀六十九石橋惠子臨濠上秦王見海神寫虹便欲飲圖星逼似真類聚九詩紀六十九壞橋壞橋虹飛亘林際星度斷山隅斜梁懸水跡畫柱脫輕朱類聚九詩紀六十九水中樓影水底罘罳出萍間反宇浮風生色不壞浪去影恆留類聚六十三詩紀六十九和湘東王後園迴文詩枝雲間石峰脈水浸山岸池清戲鵠聚樹秋飛葉散詩紀六十九詠雪顛倒使韻鹽飛亂蝶舞花落飄粉奩奩粉飄落花舞蝶亂飛鹽類聚二詩紀六十九登山馬登山馬間樹識金裝草合宜韉短影轉見鞭長何殊八公岫暫上淮南王類聚九十三文苑英華三百三十詩紀六十九和湘東王古意詠燭花中燭似將人意同憶啼流膝上燭焰落花中類聚八十詩紀六十九倡樓怨節朝日斜來照戶春鳥爭飛出林片光片影皆麗一聲一囀煎心上林紛紛花落淇水漠漠苔浮年馳節流易盡何為忍憶含羞玉臺新詠箋注九類聚三十二詩紀六十九和蕭侍中子顯春別四首和蕭侍中子顯春別四首別觀蒲萄帶實垂江南豆蔻生連枝無情無意猶如此有心有恨徒別離玉臺新詠箋注九類聚三十二升菴詩話詩紀六十九蜘蛛作絲滿帳中芳草結葉當行路紅臉脈脈一生啼黃鳥飛飛有時度故人雖故昔經新新人雖新復應故玉臺新詠箋注九類聚三十二作江總閨怨詩詩紀六十九可憐淮水去來潮春堤楊柳覆河橋淚迹未燥詎終朝行聞玉佩已相要玉臺新詠箋注九類聚三十二詩紀六十九桃紅李白若朝粧羞持顦顇比新芳不惜暫住君前死愁無西國更生香同上夜望單飛鴈天霜河白夜星稀一鴈聲嘶何處歸早知半路應相失不如從來本獨飛類聚九十一詩紀六十九應令蠡浦急兮川路長白雲重兮出帝鄉平原忽兮遠極目江甸阻兮羇心傷樹廬岳兮高且峻瞻派水兮去泱泱遠煙生兮含山勢風散花兮傳馨香臨清波兮望石鏡瞻鶴嶺兮睇仙莊望邦畿兮千里曠悲遙夜兮九迴腸顧龍樓兮不可見徒送目兮淚沾裳類聚二十八詩紀六十九擬古窺紅對鏡歛雙眉含愁拭淚坐相思念人一去許多時眼語笑靨迎來情心懷心想甚分明憶人不忍語含恨獨吞聲玉臺新詠箋注九昭明太子集二詩紀六十九春情春情蝶黃花紫燕相追楊低柳合露塵飛已見垂鉤挂綠樹誠知淇水沾羅衣兩童夾車問不已五馬城南猶未歸鶯啼春欲駛無為空掩扉玉臺新詠箋注九升菴詩話詩紀六十九傷離新體傷離新體傷離復傷離別後情鬱紆悽悽隱去棹憫憫愴還途慼慼意不申轉顧獨沾襟前驅經御宿後騎歷河漘胡香翼還幰清笳送後塵落日斜飛蓋餘暉承畫輪柳影長橫路槐枝深隱人桂宮夕掩銅龍扉甲館宵垂雲母幃朧朧月色上的的夜螢飛草香襲余袂露灑沾人衣帶堞淩城雲亂聚排枝度葉鳥爭歸盌中浮蟻不能酌琴間玉徽調別鶴別鶴千里別離聲絃調軫急心自驚試起登南樓還向華池遊前時篠生今欲合近日栽荷尚不抽猶是銜杯共賞處今茲對此獨生愁登樓望曖曖山川自分態偃師雖北連轘轅已南背遠聽寂無聞遙瞻目有閡含毫意不迷長嘆憶無賴類聚二十九文苑英華二百六十六詩紀六十九被幽述志詩怳忽煙霞散颼飂松柏陰幽山白楊古野路黃塵深終無千月命安用九丹金闕里長蕪沒蒼天空照心廣弘明集三十詩紀六十九附曲水聯句春色明上巳桃花落繞溝波迴巵不進綸下鉤時留臣導絳水時迴岸花觴轉更周陳肴渡玉俎垂餌下銀鉤王臺卿迴川入帳殿列俎間芳洲漢艾淩波出庾肩吾王生迴水碓蔡嫗蕩輕舟岸燭斜臨水波光上映樓殿下類聚四詩紀八十
