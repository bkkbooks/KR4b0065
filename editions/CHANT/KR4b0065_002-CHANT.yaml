body:
  text: 卷二和贈逸民應詔和贈逸民應詔紫微垂象常居為政司牧則之以膺天命明明我皇乃神乃聖功韜玉檢道光金鏡爰昔在田君德夙盛逿矣西土惟天有漢姬實剪商劉亦撥亂赫然浮夏同符共貫乾迴龍動雲蒸冰渙一戎定齊二儀貞觀軒衣禹食以服以膳舜漆堯廚匪躭匪眄夤畏上天丕顯無勌百神效職群祀歲遍瑞草晨開德星昏見鏗鏘六樂昭彰七藝白獸談經石渠稱制齊稷罷疑魯洙忘滯南風慶雲禹謨湯誓不有今弘安知昔細穀稼斯重珠玉為輕我畯既樂我億已盈貢田靡撤譏關不征四人遷貿百貨社行樓船舉帆賣藥藏名方叔率止軍幕洞開如貔如獸如霆如雷呼韓北款樓蘭南摧威加四海武讋九垓有苗已格徐方不回愍茲五濁矜此四流既開慧海廣列檀舟金輪寶印丹枕白牛率土袪惑含生離憂大羅網息作士刑休三兆驗佃百工寫質既盛商年且高周日嘉謀沃心王道乂密聖猷獨照運茲得一君唱臣從無違何弼負壺井谷擊壤衢中猶紆帝念歌詠自衷思諸舉逸美彼淳風國獻選士鄉薦教忠論才司馬試射郊宮准測天度鍾應星璣風除總至草復具腓冰輕寒盡泉長春歸射干先動載勝行飛千門照日五達含暉伊臣不佞叨備元子傳訓弦頌司教詩史朱綬傍垂安車高跱膳則不會宴則以齒澤優禮博兢懼何已聖親明主千載一逢子法臣道竭誠思恭周記希習齊葴願從雖加砥礪顧揆愚惷匪躬斯鑒孰肯為容文館詞林百五十八三日侍皇太子曲水宴並序三日侍皇太子曲水宴並序竊以周成洛邑自流水以禊除晉集華林同文軌而高宴莫不禮具義舉沓矩重規昭動神明雍熙鍾石者也皇太子生知上德英明在躬智湛靈珠辯均河注騰茂實於三善振嘉聲於八區是節也上巳屬辰餘萌達壤倉庚應律女夷司候爾乃分階樹羽疏泉泛爵蘭觴沿泝蕙肴來往賓儀式序盛德有容吹發孫枝聲流嶰谷舞豔七盤歌新六變遊雲駐綵仙鶴來儀都人野老雲集霧會結軫方衢飛軒照日震德叶靈年芳節淑濯伊臨灞蕩心愉目驤騎晨野摐金曉陸蕙氣卷旌神飆擎轂層岑偃蹇聳觀岧嶢煙生翠幕日照綺寮銀華晨散金芝暮搖綠水動葉丹距映條顧惟菲薄徒承恩裕藝學未優聲績不樹豈辯河書寧摛淮賦徒偶群龍終慚並馭類聚四古今歲時雜詠十六詩紀六十八又初學記四引淑目陸轂嶢寮搖七韻九日侍皇太子樂遊苑離光麗景神英春裕副極儀天金鏘玉度監撫昭明善物宣布惠潤崑瓊澤熙垂露秋晨精曜駕動宮闈露點金節霜沈玉璣玄戈側影翠羽翻暉庭迴鶴蓋水照犀衣蘭羞薦俎竹酒澄芬千音寫鳳百戲承雲紫燕躍武赤兔越空橫飛鳥箭半轉虵弓類聚四詩紀六十八應令詩微軀多幸接萼嘉運紫幄承慈青衿稟訓傍玉流溫依蘭染薰百氏既洽六義乃摛辭河瀉潤高論忘疲翠幙晨宇朱花夜池牕斜八綺燈懸百枝類聚二十一詩紀六十八愍亂詩瞻彼阪田嗟斯氛霧謀之不臧褰我王度南史朱异傳詩紀六十八上巳侍宴林光殿曲水上巳侍宴林光殿曲水芳年留帝賞應物動天襟挾苑連金陣分衢度羽林帷宮對廣掖層殿邇高岑風旗爭曳影亭皋共生陰林花初墮蔕池荷欲吐心類聚四初學記四古今歲時雜詠十六文苑英華百七十二詩紀六十八和武帝宴詩二首校尉開疎勒將軍定月支南通新息柱北屆武陽碑豫遊戲馬館教戰昆明池銀塘瀉清渭銅溝引直漪常從良家子命中幽并兒金鞍飾紫佩玉燕帖青驪車書今已共願奏云亭儀類聚五十九詩紀六十八祭壺今息鼓董案或開帷聊舉青龍陣正取絳宮時犒兵隨後拒軷祭逐前師軍門初露節步陳始分旗同上侍遊新亭應令神襟愍行邁岐路愴徘徊遙瞻十里陌傍望九城臺鳳管流虛谷龍騎藉春荄曉光浮野映朝煙承日迴沙文浪中積春陰江上來柳葉帶風轉桃花含雨開聖情蘊珠綺札命表英才顧憐碔砆質何以儷瓊瓌文苑英華百七十九詩紀六十八奉和登北顧樓奉和登北顧樓舂陵佳麗地濟水鳳凰宮況此徐方域川岳邁周灃皇情愛歷覽遊涉擬崆峒聊驅式道候無勞襄野童霧崖開早日晴天歇晚虹去帆入雲裏遙星出海中類聚六十三初學記二十四文苑英華百七十五詩紀六十八登烽火樓聳樓排樹出卻堞帶江清陟峰試遠望鬱鬱盡郊京萬邑王畿曠三條綺陌平亘原橫地險孤嶼派流生悠悠歸棹入渺渺去帆驚水煙浮岸起遙禽逐霧征類聚六十三文苑英華三百十一詩紀六十八玩漢水玩漢水雜色崑崙水泓澄龍首渠豈若茲川麗清流疾且徐離離細磧淨藹藹樹陰疎石衣隨溜卷水芝扶浪舒連翩瀉去楫鏡澈倒遙墟聊持點纓上於是察川魚類聚八詩紀六十八登城日影半東簷靖念空杼柚小堂倦縹書華池厭脩竹寂寞既寡悰登城望原陸遙山半吐雲嚴飆時響谷靡靡見虛煙森森視寒木落霞乍續斷晚浪時迴復遠矚既濡翰徒自勞心目短歌雖可裁緣情非霧縠類聚六十三詩紀六十八山池日暮芙蓉水聊登鳴鶴舟飛艫飾羽長幔覆緹油停輿依柳息住蓋影空留古樹橫臨沼新藤上挂樓魚遊向闇集戲鳥逗楂流類聚九詩紀六十八贈張纘儀表咸推挹墻仞難窺踐既富垂帷學復折波濤辯綺思曖霞飛清文煥飆轉朱旗赫容與彫棨紛曜煜波搖白鱧舟風動蒼鷹舳九疑勢參差江天相蔽虧三春澧浦葉九月洞庭枝洞庭枝嬝娜澧浦葉參差芬芳與搖落俱應傷別離類聚三十一文苑英華二百四十七詩紀六十八餞廬陵內史王脩應令餞行臨上節開筵命羽觴迴池瀉飛棟濃雲垂畫堂疎槐未合影仄日暫流光園梅歛新藻階蕙結初芳類聚二十九詩紀六十八餞臨海太守劉孝儀蜀郡太守劉孝勝碣石臨東海峨嵋距西候兩杜昔夾河二龍今出守方無夜犬驚向息神牛鬭涼風遶輕幕麥雨交新溜念此一銜觴懷離在惟舊類聚二十九詩紀六十八經琵琶峽經琵琶峽由來歷山川此地獨迴邅百嶺相紆蔽千崖共隱天橫峰時礙水斷岸或通川還瞻已迷向直去復疑前夕波照孤月山枝歛夜煙此時愁緒密魂九遷文苑英華百六十一詩紀六十八又類聚二十七引天川二韻仙客漆水豈難變桐刀乍可揮青書長命籙紫水芙蓉衣高翔五岳小低望九河微穿池聽龍長叱石待羊歸酒闌時節久桃生歲月稀類聚七十八詩紀六十八往虎窟山寺往虎窟山寺塵中喧慮積物外眾情捐茲地信爽塏墟壟曖阡綿藹藹車徒邁飄飄旌眊懸細松斜遶逕峻嶺半藏天古樹無枝葉荒郊多野煙分花出黃鳥挂石下新泉蓊鬱均雙樹清虛類八禪栖神紫臺上縱意白雲邊徒然嗟小藥何由齊大年廣弘明集三十作陳江令詩紀六十八又類聚七十六引天煙泉禪邊年六韻望同泰寺浮圖遙看官佛圖帶璧復垂珠燭銀踰漢汝寶鐸邁昆吾日起光芒散風吟宮徵殊露落盤恆滿桐生鳳不雛飛幡雜晚虹畫鳥狎晨鳧梵世凌空下應真蔽景趨帝馬咸千轡天衣盡六銖意樂開長表多寶現金軀能令苦海渡復使慢山踰願能同四忍長當出九居類聚七十六廣弘明集三十詩紀六十八蒙預懺直疏詩蒙預懺直疏詩皇情矜幻俗聖德愍重昏制書開攝受絲綸廣慧門時英滿君囿法侶盛天園俱銷五道縛共蕩四生怨三脩祛愛馬六念靜心猿庭深林彩豔地寂鳥聲喧上風吹法鼓垂鈴鳴晝軒新梅含未發落桂聚還翻早煙藏石磴寒潮浸水門一朝蒙善誘方願遣籠樊類聚七十六廣弘明集三十詩紀六十八蒙華林園戒詩庸夫躭世樂俗士重虛名三空既難了八風恆易傾伊余久齊物本自一枯榮弱齡愛箕潁由來重伯成非為樂肥遯特是厭逢迎執珪守藩國主器作元貞昔日書銀字久自恧宗英斯焉佩金璽何由廣德聲居高常慮缺持滿每憂盈茲言信非矯丹心良可明舟航奉睿訓接引降皇情心燈朗暗室牢舟出愛瀛是節高秋晚泬寥天氣清郊門光景麗祈年雲霧生紅蕖間青瑣紫露濕丹楹葉疎行逕出泉溜遠山鳴綠衿依浦戍絳顙拂林征庶蒙八解益方使六塵輕脫聞時可去非𠫤舍重城廣弘明集三十詩紀六十八旦出興業寺講詩沐芳肅朝帶駕言抵淨宮羽旗承去影鐃吹雜還風吳戈夏服箭驥馬綠沈弓水照柳初碧煙含桃半紅由來六塵縛宿昔五纏朦見鶴徒知謬察象理難同方知恧四辯奚用語三空廣弘明集三十詩紀六十八又類聚七十六引宮風弓紅同空六韻遊光宅寺詩應令陪遊入舊豐雲氣鬱青葱紫陌垂青柳輕槐拂慧風八泉光綺樹四柱曖臨空翠網隨煙碧丹花共日紅方欣大雲溥慈波流淨宮廣弘明集三十詩紀六十八如幻漢安設大響周穆置高臺三里生雲霧瞬息起冰雷空持生識縛徒用長心災慧人恆棄捨庸識屢邅迴六塵俱不實三界信悠哉類聚七十六詩紀六十八水月圓輪既照水初生亦映流溶溶如漬璧的的似沈鉤非關顧兔沒豈是桂枝浮空令誰雅識還用喜騰猴萬累若消蕩一相更何求同上如響疊嶂迥參差連峰鬱相拒遠聞如句詠遙應成言語竟無五聲實誰謂八音所空成顛倒群徒迷塵縛侶愍哉火宅中茲心良可去同上如夢祕駕良難辯司夢並成虛未驗周為蝶安知人作魚空聞延壽賦徒勞岐伯書潛令六識擾安能二惑除當須耳應滿然後會真如同上如影朝光照皎皎夕漏轉駸駸晝花斜色去夜樹有輕陰並能興眼入俱持動惑心息形影方止逐物慮恆侵若悟假名淺方知實相深同上鏡象精金宛成器懸鏡在高堂後挂七龍網前發四珠光迥望疑垂月傍瞻譬璧璫仁壽含萬類淮南辯四鄉終歸一亡有何關至道場同上和湘東王名士悅傾城和湘東王名士悅傾城美人稱絕世麗色比花叢經居李城北來往宋家東教歌公主第學舞漢成宮多遊淇水上好在鳳樓中履高疑上砌裾開特畏風衫輕見跳脫珠概雜青蟲垂絲繞帷幔落日度房櫳粧窗隔柳色井水照桃紅非憐江浦佩羞使春閨空玉臺新詠箋注七類聚十八詩紀六十八和徐錄事見內人作臥具密房寒日晚落照度窗邊紅簾遙不隔輕帷半卷懸方知纖手製詎減縫裳妍龍刀橫膝上畫尺墮衣前熨斗金塗色簪管白牙纏衣裁合歡襵文作鴛鴦連縫用雙針縷絮是八蠶綿香和麗丘蜜麝吐中臺煙已入琉璃帳兼雜太華氈且共雕鑪暖非同團扇捐更恐從軍別空床徒自憐玉臺新詠箋注七詩紀六十八戲贈麗人戲贈麗人麗妲與妖嬙共拂可憐粧同安髻裏撥異作額間黃羅裙宜細簡畫屧重高牆含羞未上砌微笑出長廊取花爭間鑷攀枝念蕊香但歌聊一曲鳴絃未肯張自矜心所愛三十侍中郎玉臺新詠箋注七類聚十八詩紀六十八率爾為詠借問仙將畫詎有此佳人傾城且傾國如雨復如神漢后憐名燕周王重姓申挾瑟曾遊趙吹簫屢入秦玉階偏望樹長廊每逐春約黃出意巧纏絃用法新迎風時引袖避日暫披巾疎花映鬟插細佩繞衫身誰知日欲暮含羞不自陳玉臺新詠箋注七詩紀六十八執筆戲書舞女及燕姬倡樓復蕩婦參差大戾發搖曳小垂手釣竿蜀國彈新城折楊柳玉案西王桃蠡杯石榴酒甲乙羅帳異辛壬房戶暉夜夜有明月時時憐更衣玉臺新詠七詩紀六十八從頓蹔還城從頓蹔還城漢渚水初綠江南草復黃日照蒲心暖風吹梅蕊香征艫艤湯塹歸騎息金隍舞觀衣常襞歌臺絃未張持此橫行去誰念守空床玉臺新詠箋注七類聚六十三初學記二十四詩紀六十八秋閨夜思非關長信別詎是良人征九重忽不見萬恨滿心生夕門掩魚鑰宵床悲畫屏迥月臨窗度吟蟲繞砌鳴初霜隕細葉秋風驅亂螢故粧猶累日新衣襞未成欲知妾不寐城外擣衣聲玉臺新詠箋注七類聚三十二詩紀六十八詠內人晝眠詠內人晝眠北窗聊就枕南簷日未斜攀鉤落綺障插捩舉琵琶夢笑開嬌靨眠鬟壓落花簟文生玉腕香汗浸紅紗夫壻恆