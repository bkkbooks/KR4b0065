body:
  text: 卷一上之回前斾拂回中後車臨桂宮輕絲駐雲罕春色繞川風桃林方灼灼柳路日曈曈笳聲駭胡騎清磬讋山戎微臣今拜手願帝永無窮樂府詩集十六詩紀六十七採桑春色映空來先發院邊梅細萍重疊長新花歷亂開連珂往淇上接幰至叢臺叢臺可憐妾當窗望飛蝶忌跌行衫領熨斗成褫襵下床著珠珮捉鏡安花鑷薄晚畏蠶饑競採春桑葉寄語採桑伴訝今春日短枝高攀不及葉細籠難滿年年將使君歷亂遣相聞欲知琴裏意還贈錦中文何當照梁日還作入山雲重門皆已閉方知留客袂可憐黃金絡複以青絲繫必也為人時誰令畏夫壻文苑英華二百八詩紀六十七又類聚八十八及樂府二十八並引梅開臺蝶襵短滿七韻蜀國絃歌篇十韻蜀國絃歌篇十韻銅梁指斜谷劍道望中區通星上分野作固下為都雅歌因良守妙舞自巴渝陽城嬉樂所劍騎鬱相趨五婦行難至百兩好遊娛牲祈望帝祀酒酹蜀侯誅江妃納重聘卓女愛將雛停弦時繫爪息吹更治朱春衫湔錦浪迴扇避陽烏聞君握節返賤妾下城隅玉臺新詠箋注七文苑英華二百一詩紀六十七豔歌篇十八韻豔歌篇十八韻凌晨光景麗倡女鳳樓中前瞻削成小傍望卷旌空分妝間淺靨繞臉傅斜紅張琴未調軫飲吹不全終自知心所愛出入仕秦宮誰言連尹屈更是莫敖通輕軺綴皂蓋飛轡轢雲驄金鞍隨繫尾銜璅映纏鬉戈鏤荊山玉劍飾丹陽銅左把蘇合彈旁持大屈弓控絃因鵲血挽彊用牛螉弋獵多登隴酣歌每入豐暉暉隱落日冉冉還房櫳鐙生陽燧火塵散鯉魚風流蘇時下帳象簟復韜筒霧暗窗前柳寒疎井上桐女蘿托松際甘瓜蔓井東拳拳特君愛歲暮望無窮玉臺新詠箋注七樂府詩集三十九詩紀六十七妾薄命篇十韻妾薄命篇十韻名都多麗質本自恃容姿蕩子行未至秋胡無定期玉貌歇紅臉長顰串翠眉奩鏡迷朝色縫鍼脆故絲本異搖舟咎何關竊席疑生離誰拊背溘死遽成遲王嬙貌本絕踉蹌入氈帷盧姬嫁日晚非復少年時轉山猶可遂烏白望難期妾心徒自苦旁人會見嗤玉臺新詠箋注七文苑英華二百七樂府詩集六十二詩紀六十七又類聚四十一引姿期眉惟時五韻君子行君子懷琬琰不使涅塵淄從容子雲閣寂寞仲舒帷多謝悠悠子管窺良可悲類聚四十一樂府詩集三十二詩記六十七從軍行貳師惜善馬樓蘭貪漢財前年出右地今歲討輪臺魚雲望旗聚龍沙隨陣開冰城朝浴鐵地道夜銜枚將軍號令密天子璽書催何時反舊里遙見下機來類聚四十一樂府詩集三十二雲中亭障羽檄驚甘泉烽火通夜明貳師將軍新築營嫖姚校尉初出征復有山西將絕世愛雄名三門應遁甲五壘學神兵白雲隨斾色蒼山答鼓聲邐迤觀鵝翼參差睹雁行先平小月陣卻滅大宛城善馬還長樂黃金付水衡小婦趙人能鼓瑟侍婢初笄解鄭聲庭前柳絮飛欲合必應紅妝起見迎玉臺新詠箋注九類聚四十一文苑英華百九十九樂府詩集三十二詩紀六十七長安有狹斜行長安有徑塗塗徑不通輿道逢雙總丱扶輪問我居我居青門北可憶復易尋大息騫金勒中息綰黃銀小息始得意黃頭作弄臣三息俱入門雅志揚清塵三息俱上堂觴肴滿四陳三息俱入戶照耀光容新大婦舒綺絪中婦拂羅巾小婦最容冶映鏡學嬌顰丈人且安坐清謳出絳脣樂府詩集三十五詩紀六十七泛舟橫大江泛舟橫大江滄波白日暉遊子出王畿旁望重山轉前觀遠帆稀廣水浮雲吹江風引夜衣旅鴈同洲宿寒鳧夾浦飛行客誰多病當念早旋歸文苑英華百九十三樂府詩集三十八詩紀六十七隴西行邊秋胡馬肥雲中驚寇入勇氣特無侶輕兵救邊急沙平不見虜嶂嶮還相及出塞豈成歌經川未遑汲烏孫塗更阻康居路猶澀月暈抱龍城星流照馬邑長安路遠書不還寧知征人獨佇立類聚四十一文苑英華百九十八樂府詩集三十七詩紀六十七隴西四戰地羽檄歲時聞護羌擁漢節校尉立元勳石門留鐵騎冰城息夜軍洗兵逢驟雨送陣出黃雲沙長無止泊水脈屢縈分當思勒彝鼎無用想羅裙文苑英華百九十八樂府詩集三十七詩紀六十七悠悠懸斾旌知向隴西行減竈驅前馬銜枚進後兵沙飛朝似幕雲起夜疑城迴山時阻路絕水亟稽程往年郅支服今歲單于平方歡凱樂盛飛蓋滿西京同上鴈門太守行二首輕霜中夜下黃葉遠辭枝寒苦春難覺邊城秋易知風急旍旗斷塗長鎧馬疲少解孫吳法家本幽并兒非關買鴈肉徒勞皇甫規類聚四十二文苑英華百九十六樂府詩集三十九詩紀六十七隴暮風恆急關寒霜自濃櫪馬夜方思邊衣秋未重潛師夜接戰略地曉摧鋒悲笳動胡塞高旗出漢墉勤勞謝功業清白報迎逢非須主人賞寧期定遠封單于如未繫終夜慕前蹤文苑英華百九十六樂府詩集三十九詩紀六十七京洛篇南遊偃師縣斜上灞陵東回瞻龍首堞遙望德陽宮重門遠照耀天閣復穹窿城傍疑複道樹裏識松風黃河入洛水丹泉繞射熊夜輪懸素魄朝光蕩碧空秋霜曉驅鴈春雨暮成虹曲陽造甲第高安還禁中劉蒼歸作相竇憲出臨戎此時車馬合茲晨冠蓋通誰知兩京盛歡宴遂無窮類聚四十二文苑英華百九十二樂府詩集三十九詩紀六十七櫂歌行妾家住湘川菱歌本自便風生解刺浪水深能捉船葉亂由牽荇絲飄為折蓮濺妝疑薄汗沾衣似故湔浣紗流暫濁汰錦色還鮮參同趙飛燕借問李延年從來入絃管詎在櫂歌前類聚四十二文苑英華二百三樂府詩集四十詩紀六十七怨歌行十五頗有餘日照杏梁初蛾眉本多嫉掩鼻特成虛持此傾城貌翻為不肖軀秋風吹海水寒霜依玉除月光臨戶駛荷花依浪舒望簷悲雙翼窺沼泣前魚苔生履處沒草合行人疎裂紈傷不盡歸骨恨難祛早知長信別不避後園輿文苑英華二百十一樂府詩集四十二詩紀六十七美女篇佳麗盡關情風流最有名約黃能效月裁金巧作星粉光勝玉靚衫薄擬蟬輕密態隨流臉嬌歌逐軟聲朱顏半已醉微笑隱香屏文苑英華百九十三樂府詩集六十三詩紀六十七鬭雞歡樂良無已東郊春可遊百花非一色新田多異流龍尾橫津漢車箱起戍樓玉冠初警敵芥羽忽猜儔十日驕既滿九勝勢恆遒脫使田饒見堪能說魯侯初學記三十文苑英華二百六詩紀六十七又類聚九十一引傳遒侯三韻苦熱行六龍騖不息三伏起炎陽寢興煩几案俯仰倦幃床滂沱汗似鑠微靡風如湯洄池愧玉浪蘭殿非含霜細簾時半卷輕幌乍橫張雲斜花影沒日落荷心香願見洪崖井詎憐河朔觴類聚五文苑英華二百十樂府詩集六十五詩紀六十七茱萸女茱萸生狹斜結子復銜花遇逢纖手摘濫得映鉛華雜與鬟簪插偶逐鬢鈿斜東西爭贈玉縱橫來問家不無夫壻馬空駐使君車樂府詩集七十三詩紀六十七棗下何纂纂垂花臨碧澗結翠依丹巘非直入游宮兼期植靈苑落日芳春暮遊人歌吹晚弱刺引羅衣朱實凌還幰且歡洛浦詞無羡安期遠樂府詩集七十四詩紀六十七金樂歌金樂歌槐香欲覆井楊柳正藏鴉山鑪好無比玉構火窗賒床頭辟繩結鏡上領巾斜鐵鑊種梁子銅樞生棗花開門拋水柱城按特言家文苑英華百九十三樂府詩集七十四詩紀六十七行幸甘泉宮雉歸海水寂裘來重譯通吉行五十里隨處宿離宮鼓聲恆入地塵飛上暗空尚書隨豹尾太史逐相風銅鳴周國鐩旗曳楚雲虹倖臣射覆罷從騎新歌終董桃拜金紫賢妻侍禁中不羡神仙侶排煙逐駕鴻文苑英華二百三樂府詩集八十四詩紀六十七有所思昔未離長信金翠奉乘輿何言人事異夙昔故恩疎寂寞錦筵靜玲瓏玉殿虛掩閨泣團扇羅幌詠蘼蕪文苑英華二百二樂府詩集十七詩紀六十七臨高臺高臺半行雲望望高不極草樹無參差山河同一色彷彿洛陽道道遠難別識玉階故情人情來共相憶玉臺新詠箋注七作梁武帝文苑英華二百十樂府詩集十八詩紀六十七折楊柳楊柳亂成絲攀折上春時葉密鳥飛礙風輕花落遲城高短簫發林空畫角悲曲中無別意併為久相思玉臺新詠箋注七類聚八十九文苑英華二百八樂府詩集二十二作柳惲詩紀六十七洛陽道洛陽佳麗所大道滿春光遊童初挾彈蠶妾始提筐金鞍照龍馬羅袂拂春桑玉車爭晚入潘果溢高箱玉臺新詠箋注七類聚四十二文苑英華百九十二樂府詩集二十三詩紀六十七紫騮馬賤妾朝下機正值良人歸青絲懸玉蹬朱汗染香衣驟急珂彌響𨁏多塵亂飛雕胡幸可薦故心君莫違玉臺新詠箋注七類聚九十三文苑英華二百九樂府詩集二十四詩紀六十七長安道神皋開隴右陸海實西秦金槌抵長樂複道向宜春落花依度幰垂柳拂行輪金張及許史夜夜尚留賓文苑英華百九十二樂府詩集二十三詩紀六十七江南思二首江南思二首江南有妙伎時則應璿樞月暈蘆灰缺秋還懸炭枯含丹和九轉芳樹蔭千株何辭天后誚終是列仙都文苑英華二百一樂府詩集二十六詩紀六十七桂楫晚應旋歷岸扣輕舷紫荷擎釣鯉銀筐插短蓮人歸浦口暗那得久迴船同上雞鳴高樹顛碧玉好名倡夫壻侍中郎桃花全覆井金門半隱堂時欣一來下復比雙鴛鴦雞鳴天尚早東烏定未光文苑英華二百六樂府詩集二十八詩紀六十七明君詞玉豔光瑤質金鈿婉黛紅一去葡萄觀長別披香宮秋簷照漢月愁帳入胡風妙工偏見詆無由情恨通文苑英華二百四樂府詩集二十九詩紀六十七當置酒當置酒置酒宴嘉賓矚迥臨飛觀絕嶺隔天餘長嶼橫江半日色花上綺風光水中亂三益既葳蕤四始方蔥粲樂府詩集三十一陸士衡文集七詩紀六十七詠中婦織流黃詠中婦織流黃翻花滿階砌愁人獨上機浮雲西北起孔雀東南飛調絲時繞腕易鑷乍牽衣鳴梭逐動釧紅妝映落暉類聚六十五樂府詩集三十五詩紀六十七豔歌曲豔歌曲雲楣桂成戶飛棟杏為梁斜窗通蕊氣細隙引塵光裁衣魏后尺汲水淮南床青驪暮當返預使羅裾香玉臺新詠箋注七類聚四十二樂府詩集三十九詩紀六十七怨詩秋風與白團本自不相安新人及故愛意氣豈能寬黃金肘後鈐白玉案前盤誰堪空對此還成無歲寒玉臺新詠箋注七樂府詩集四十一詩紀六十七採蓮曲採蓮曲晚日照空磯採蓮承晚暉風起湖難度蓮多摘未稀棹動芙蓉落船移白鷺飛荷絲傍繞腕菱角遠牽衣類聚八十二樂府詩集五十詩紀六十七霹靂引來從東海上發自南山陽時聞連鼓響乍散投壺光飛車走四瑞繞電發時祥令去於斯表殺來永傳芳樂府詩集五十七詩紀六十七雉朝飛操晨光照麥畿平野度春翬避鷹時聳角妬壟或斜飛少年從遠役有恨意多違不如隨蕩子羅袂拂臣衣類聚九十樂府詩集五十七詩紀六十七雙燕離雙燕有雄雌照日兩差池銜花落北戶逐蝶上南枝桂棟本曾宿虹梁早自窺願得長如此無令雙燕離類聚九十二樂府詩集五十八詩紀六十七貞女引借問懷春臺百尺凌雲霧北有歲寒松南臨女貞樹庭花對帷滿隙月依枝度但使明妾心無嗟坐遲暮樂府詩集五十八詩紀六十七龍丘引龍丘一回首楚路蒼無極水照弄珠影雲吐陽臺色浦狹村煙度洲長歸鳥息遊蕩逐春心空憐無羽翼樂府詩集五十八詩紀六十七賦得當壚賦得當壚十五正團圓流光滿上蘭當壚設夜酒宿客解金鞍迎來挾瑟易送別唱歌難詎知心恨急翻令衣帶寬玉臺新詠箋注七樂府詩集六十三詩紀六十七昇仙篇少室堪求道明光可學仙丹繒碧琳宇綠玉黃金篇雲車了無轍風馬詎須鞭靈桃恆可餌幾迴三千年文苑英華百九十三樂府詩集六十四詩紀六十七和人以妾換馬和人以妾換馬功名幸多種何事苦生離誰言似白玉定是媿青驪必取匣中釧迴作飾金羈真成恨不已願得路傍兒類聚九十三樂府詩集七十三詩紀六十七半路溪半路溪相逢半路溪隔溪猶不渡望望判知是翩翩識行步摘贈蘭澤芳欲表同心句先將動舊情恐君疑妾妬樂府詩集七十四作梁元帝詩紀六十七擬沈隱侯夜夜曲擬沈隱侯夜夜曲靄靄夜中霜何關向曉光枕啼常帶粉身眠不著床蘭膏盡更益薰鑪滅復香但問愁多少便知夜短長玉臺新詠箋注七樂府詩集七十六詩紀六十七獨處怨獨處怨獨處恆多怨開幕試臨風彈棊鏡奩上傅粉高樓中自從征馬去音信不曾通只恐金屏掩明年已復空樂府詩集七十六詩紀六十七楚妃歎楚妃歎幽閨情脈脈漏長宵寂寂草螢飛夜戶絲蟲繞秋壁薄笑未為欣微歎還成戚金簪鬢下垂玉筯衣前滴玉臺新詠箋注七類聚四十二樂府詩集二十九詩紀六十七新成安樂宮新成安樂宮遙看雲霧中刻桷映丹紅珠簾通曉日金華拂夜風欲知歌管處來過安樂宮玉臺新詠箋注七類聚六十二初學記二十四文苑英華百九十二樂府詩集三十八萬花谷後二十三詩紀六十七雙桐生空井季月雙桐井新枝雜舊株晚葉藏栖鳳朝花拂曙烏還看西子照銀床牽轆轤玉臺新詠箋注七樂府詩集三十一詩紀六十七南湖南湖荇葉浮復有佳期遊銀綸翡翠釣玉舳芙蓉舟荷香亂衣麝橈聲隨急流玉臺新詠箋注七樂府詩集四十八詩紀六十七北渚岸陰垂柳葉平江含粉堞好值城旁人多逢蕩舟妾綠水濺長袖浮苔染輕楫同上大堤宜城斷中道行旅亟流連出妻工織素妖姬慣數錢炊雕留上客貰酒逐神仙同上賦樂府得大垂手賦樂府得大垂手垂手忽苕苕飛燕掌中嬌羅衣恣風引輕帶任情搖詎似長沙地促舞不回腰玉臺新詠箋注七樂府詩集七十六作吳均詩紀六十七小垂手小垂手舞女出西秦躡影舞陽春且復小垂手廣袖拂紅塵折腰應兩袖頓足轉雙巾蛾眉與曼臉見此空愁人樂府詩集七十六作吳均詩紀六十七有所思三首有所思三首可歎不可思可思不可見餘絃斷瑟柱殘朱染歌扇玉臺新詠箋注十詩紀六十七寂寂暮檐響黯黯垂簾色唯有瓴甋苔如見蜘蛛織同上入林看碚礧春至定無賒何時一可見更得似梅花同上蜀道難二首建平督郵道魚復永安宮若奏巴渝曲時當君思中樂府詩集四十詩紀六十七巫山七百里巴水三迴曲笛聲下復高猿啼斷還續類聚四十二文苑英華二百樂府詩集四十萬花谷續十二詩紀六十七採菱曲採菱曲菱花落復含桑女罷新蠶桂棹浮星艇徘徊蓮葉南類聚八十二樂府詩集五十一詩紀六十七別鶴接翮同發燕孤飛獨向楚值雪已迷群驚風復失侶樂府詩集五十八文苑英華二百六詩紀六十七生別離別離四弦聲相思雙笛引一去十三年復無好音信文苑英華二百二樂府詩集七十二詩紀六十七夜夜曲北斗闌干去夜夜心獨傷月輝橫射枕燈光半隱床玉臺新詠箋注十樂府詩集七十六作沈約詩紀六十七春江曲春江曲客行秪念路相爭度京口誰知堤上人拭淚空搖手玉臺新詠箋注十樂府詩集七十七詩紀六十七桃花曲但使新花豔得間美人簪何須論後實怨結子瑕心樂府詩集七十七詩紀七十七樹中草幸有青袍色聊因翠幄凋雖間珊瑚蔕非是合歡條樂府詩集七十七詩紀七十七上留田行正月土膏初欲發天馬照耀動農祥田家斗酒群相勞為歌長安金鳳凰文苑英華二百十一樂府詩集三十八詩紀六十七烏夜啼綠草庭中望明月碧玉堂裏對金鋪鳴弦撥捩發初異挑琴欲吹眾曲殊不疑三足朝含影直言九子夜相呼羞言獨眠枕下淚託道單棲城上烏文苑英華二百六樂府詩集四十七詩紀六十七烏棲曲四首芙蓉作船絲作䋏北斗橫天月將落采桑渡頭礙黃河郎今欲渡畏風波玉臺新詠箋注九類聚四十二樂府詩集四十八詩紀六十七浮雲似帳月成鉤那能夜夜南陌頭宜城醞酒今行熟莫惜停鞍暫棲宿玉臺新詠箋注九類聚四十二文苑英華二百六樂府詩集四十八詩紀六十七青牛丹轂七香車可憐今夜宿倡家倡家高樹烏欲棲羅幃翠帳向君低同上織成屏風銀屈膝朱脣玉貌鐙前出相看氣息望君憐誰能含羞不自前同上採菊篇月精麗草散秋株洛陽少婦絕妍姝相呼提筐採菊珠朝起露濕霑羅襦東方千騎從驪駒更不下山逢故夫文苑英華二百八樂府詩集六十四詩紀六十七東飛伯勞歌二首翻階蛺蝶戀花情容華飛燕相逢迎誰家總角岐路陰裁紅點翠愁人心天窗綺井曖徘徊珠簾玉篋明鏡臺可憐年幾十三四工歌巧舞入人意白日西落楊柳垂含情弄態兩相知文苑英華二百三樂府詩集六十八詩紀六十七西飛迷雀東羈雉倡樓秦女乍相值誰家妖麗鄰中止輕妝薄粉光閭里網戶珠綴曲瓊鉤芳茵翠被香氣流少年年幾方三六含嬌聚態傾人目餘香落蕊坐相催可憐絕世為誰媒同上雞鳴篇雞鳴篇塒雞識將曙長鳴高樹顛啄葉疑障羽排花強欲前意氣多驚舉飄颺獨無侶陳思助鬭協狸膏郈昭妬敵安金距丹山可愛有鳳凰金門飛舞有鴛鴦何如五德美豈勝千里翔類聚九十一樂府詩集二十八作劉孝威詩紀六十七度關山關山遠可度遠度復難思直指遮歸道都護總前期力農爭地利轉戰逐天時材官蹶張皆命中弘農越騎盡搴旗搴旗遠不息驅虜何窮極狼居一封難再覩閼氏永去無容色銳氣且橫行朱旗亂日精先屠光祿塞卻破夫人城凱歌還舊里非是衒功名類聚四十二文苑英華百九十八樂府詩集二十七詩紀六十七三首江南曲和云陽春路時使佳人度枝中水上春併歸長楊掃地桃花飛清風吹人光照衣光照衣景將夕擲黃金留上客類聚四十二文苑英華二百一樂府詩集五十詩紀六十七龍笛曲和云江南弄真能下翔鳳金門玉堂臨水居一嚬一笑千萬餘遊子去還願莫疎願