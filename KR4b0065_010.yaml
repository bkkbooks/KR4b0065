body:
  text: 附錄雁門太守行鵝軍攻日逐燕騎蕩康居大宛歸善馬小月送降書顏氏家訓文章篇淫豫歌淫豫歌淫豫大如服瞿塘不可觸金沙浮轉多桂浦忌經過樂府詩集八十六梁簡文帝集上詩昔類紅蓮草自玩綠池邊今如白華樹還悲明鏡前詩紀八十歌年年花色好足侍愛君傍影入著衣鏡裙含辟惡香鴛鴦七十二亂舞未成行文苑英華七十一酬醑半兮樂既陳長歌促節綺羅人拂鏡弄影情未極迴簪轉笑思自親文苑英華三百五十一詩綺花非一種風絲亂百條歲華紀麗一霞流抱朴盌顏氏家訓文章篇謝敕賚魏國獻錦等啟山羊之毳東燕之席尚傳登高之文北鄴之錦猶見胡綾織大秦之艸戎布紡玄菟之花謝敕賚廣州塸啟淮南承月之杯豈均符彩西國浮雲之盌非謂壞奇臣南珍靡究未讀奏曹之表方物罕逢不識議即之畫謝勑賚大菘啟吳愧千里之蓴蜀慚七菜之賦是知泮官採茆空入魯詩流火烹葵徒傳豳曲謝敕賚城邊橘啟結根壟首垂陰陽壍甘踰石蜜味重金衣暉章縹李豈止稱於晉世上林芙棗非獨高於漢日謝勑賚河南萊啟海水無波來因九譯周原澤洽味備百羞堯非未儔姬歜非喻
